name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-sonnet:
    concurrency:
      group: claude-sonnet-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-sonnet')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-sonnet')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude-sonnet')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude-sonnet') || contains(github.event.issue.title, '@claude-sonnet')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code (Sonnet)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude-sonnet"
          claude_args: "--model sonnet --max-turns 25 --allowedTools Bash,Edit,Write,Glob,Grep,LS,Read"
          use_sticky_comment: true
          exclude_comments_by_actor: "*[bot]"
          additional_permissions: |
            actions: read

  claude-opus:
    concurrency:
      group: claude-opus-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-opus')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-opus')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude-opus')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude-opus') || contains(github.event.issue.title, '@claude-opus')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code (Opus)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude-opus"
          claude_args: "--model opus --max-turns 50 --allowedTools Bash,Edit,Write,Glob,Grep,LS,Read"
          use_sticky_comment: true
          exclude_comments_by_actor: "*[bot]"
          additional_permissions: |
            actions: read
